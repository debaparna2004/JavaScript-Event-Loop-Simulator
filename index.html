<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Loop Simulator UI</title>
  <!-- Link to your CSS file -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">

    <!-- Code Editor -->
    <div class="card">
      <h2>Code Editor</h2>
      <textarea id="code">console.log("Start");
setTimeout(() => console.log("Task Queue"), 0);
Promise.resolve().then(() => console.log("Microtask"));
console.log("End");</textarea>
      <button onclick="runSimulation()">Run</button>
    </div>

    <!-- Output -->
    <div class="card">
      <h2>Console Output</h2>
      <div id="output" class="output"></div>
    </div>

    <!-- Event Loop Visuals -->
    <div class="card">
      <h2>Event Loop</h2>
      <div class="panel">
        <div class="box">
          <h3>Call Stack</h3>
          <div id="callStack"></div>
        </div>
        <div class="box">
          <h3>Microtask Queue</h3>
          <div id="microtaskQueue"></div>
        </div>
        <div class="box">
          <h3>Task Queue</h3>
          <div id="taskQueue"></div>
        </div>
      </div>
    </div>

  </div>

  <!-- Link to your JavaScript file -->
  <script src="script.js"></script>
</body>
</html>
