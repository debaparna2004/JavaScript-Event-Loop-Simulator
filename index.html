<!DOCTYPE html>
<html>
<head>
  <title>Event Loop Visualizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
 
  <h2>JS Event Loop Visualizer</h2>
 
  <textarea id="code" placeholder="Write your JS here..."></textarea>
  <br>
  <button onclick="runCode()">Run</button>
  <button onclick="resetAll()">Reset</button>
 
  <div class="boxes">
    <div class="box">
      <h3>Call Stack</h3>
      <div id="callstack"></div>
    </div>
    <div class="box">
      <h3>Microtask Queue</h3>
      <div id="microtask"></div>
    </div>
    <div class="box">
      <h3>Task Queue</h3>
      <div id="taskqueue"></div>
    </div>
  </div>
 
  <div id="console-box">
    <h3>Console</h3>
    <div id="console-output"></div>
  </div>
 
  <script src="script.js"></script>
</body>
</html>
